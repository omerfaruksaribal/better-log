services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - '8123:8123'
      - '9000:9000'
    environment:
      CLICKHOUSE_USER: dev
      CLICKHOUSE_PASSWORD: dev
      CLICKHOUSE_DB: logs_db
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
volumes:
  clickhouse_data:
